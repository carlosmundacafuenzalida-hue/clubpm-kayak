name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: typecheck · test · build
    runs-on: ubuntu-latest

    env:
      # Variables dummy para que `next build` no falle por env vars faltantes.
      # No se usan: el build no contacta Supabase, solo necesita que existan.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_ci_dummy_key
      NEXT_PUBLIC_ADMIN_RUT: 12345678-5
      SESSION_SECRET: ci_session_secret_at_least_32_chars_xx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
